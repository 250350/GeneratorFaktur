<!DOCTYPE html>
<html lang="pl">
<script src="https://unpkg.com/imask"></script>
<head>
    <meta charset="UTF-8">
    <title>Generator Faktury</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 550px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 5px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Generator Faktur</h2>

    <form action="/show-invoice" method="get">
        <label for="companyName">Nazwa firmy:</label>
        <input id="companyName" name="companyName" placeholder="np. Firma Sp. z o.o.">

        <label for="address">Adres firmy:</label>
        <input id="address" name="address" placeholder="ul. Kwiatowa 5">

        <label for="postalCodeAndCity">Kod pocztowy i miejscowość:</label>
        <input id="postalCodeAndCity" name="postalCodeAndCity" placeholder="00-000 Warszawa">

        <label for="nip">NIF/CIF:</label>
        <input id="nip" name="nip" type="text"
               placeholder="12345678Z / X1234567L / B12345678"
               maxlength="9"
               required>

        <label>Produkty:</label>

        <table id="itemsTable" style="margin-top:10px; width:100%;">
            <tr>
                <th>Opis</th>
                <th>Ilość</th>
                <th>Cena netto</th>
            </tr>

            <tr>
                <td><input name="items[0].description"></td>
                <td><input type="number" name="items[0].amount"></td>
                <td><input type="number" step="0.01" name="items[0].netPrice"></td>
            </tr>
        </table>

        <button type="button" onclick="addRow()">➕ Dodaj produkt</button>

        <label for="stawkaVAT">Stawka VAT (%):</label>
        <input type="number" id="stawkaVAT" name="stawkaVAT" placeholder="23">

        <label for="invoiceNumber">Numer faktury:</label>
        <input type="number" id="invoiceNumber" name="invoiceNumber">

        <label for="completionOfServiceDate">Data wykonania usługi:</label>
        <input type="date" id="completionOfServiceDate" name="completionOfServiceDate">

        <label for="bankAccountNumber">Numer konta Bankowego (na który ma przyjść przelew):</label>
        <input type="text" id="bankAccountNumber" name="bankAccountNumber"
               pattern="\d{1,26}" maxlength="26" inputmode="numeric"
               placeholder="maks 26 cyfr">

        <label for="swift">SWIFT:</label>
        <input type="text" id="swift" name="swift"
               pattern="[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}[A-Z0-9]{3}" maxlength="11">

        <label for="paymentDate">Termin płatności:</label>
        <input type="date" id="paymentDate" name="paymentDate">

        <button type="submit">Generuj fakturę</button>
    </form>
</div>
<script>
    const nipInput = document.getElementById('nip');

    IMask(nipInput, {
        mask: 'XXXXXXXXX',

        definitions: {
            X: /[0-9A-Z]/
        },

        prepare: (str) => str.toUpperCase(),

        validate: (value) => {
            if (value.length < 9) return true;

            return (
                /^[0-9]{8}[A-Z]$/.test(value) ||      // NIF
                /^[XYZ][0-9]{7}[A-Z]$/.test(value) || // NIE
                /^[A-Z][0-9]{7}[A-Z0-9]$/.test(value) // CIF
            );
        }
    });
        let index = 1;

        function addRow() {
        const table = document.getElementById("itemsTable");

        const row = table.insertRow();

        row.innerHTML = `
        <td><input name="items[${index}].description"></td>
        <td><input type="number" name="items[${index}].amount"></td>
        <td><input type="number" step="0.01" name="items[${index}].netPrice"></td>
    `;

        index++;
    }
</script>
</body>
</html>
