<h1>Factura para autónomos en España</h1>

<p>Si eres autónomo, necesitas emitir facturas legales con IVA. Nuestro generador está adaptado a la normativa española.</p>

<h2>Qué debe incluir una factura</h2>
<ul>
  <li>Datos del emisor</li>
  <li>Datos del cliente</li>
  <li>NIF/NIE</li>
  <li>IVA</li>
</ul>
